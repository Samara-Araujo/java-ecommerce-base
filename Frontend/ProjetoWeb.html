<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Loja - Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
        <h2>Teclado Mecânico</h2>
        <p id="preco-teclado">R$ 250,00</p>
        <input type="text" id="cupom-teclado" placeholder="CUPOM">
        <button onclick="comprar('teclado')">Comprar</button>
    </div>

    <div class="card">
        <h2>Mouse Gamer</h2>
        <p id="preco-mouse">R$ 150,00</p>
        <input type="text" id="cupom-mouse" placeholder="CUPOM">
        <button onclick="comprar('mouse')">Comprar</button>
    </div>
</div>

   <script src="script.js"></script>
</body>
</html>
