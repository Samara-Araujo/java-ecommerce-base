        <h2>Teclado Mecânico</h2>

       style="width: 80%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; text-align: center;">
        <button onclick="comprar()">Adicionar ao Carrinho</button>
    </div>

   <script src="script.js"></script>
</body>
